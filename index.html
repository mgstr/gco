<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Geocaches</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#007aff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Geocaches">
<link rel="apple-touch-icon" href="./icons/pwa/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/pwa/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icons/pwa/favicon-16.png">
<link rel="stylesheet" href="./style.css">
<link rel="preload" href="./data.json" as="fetch" crossorigin>
</head>
<body>
<div id="view-search">
<div id="top">
  <div class="searchrow">
    <input id="q" type="search" placeholder="Otsi nime või GC koodi…" autofocus autocorrect="off" autocapitalize="none" spellcheck="false">
    <div class="toggles">
      <label class="ownertoggle"><input type="checkbox" id="ownerChk"> omanik</label>
      <label class="ownertoggle"><input type="checkbox" id="regionChk"> maakond</label>
    </div>
  </div>
  <div class="statusrow">
    <button type="button" id="menuBtn" aria-label="Menüü">...</button>
    <div id="count"></div>
    <label class="ownertoggle" id="hideFoundWrap" style="display:none">
      <input type="checkbox" id="hideFoundChk">
      <span class="hidefound-icon" aria-hidden="true">🙂</span>
    </label>
    <select id="sortSel">
      <option value="id" selected>ID järgi</option>
      <option value="name">Nime järgi</option>
      <option value="distance" id="distOpt" disabled>Kauguse järgi</option>
    </select>
    <button type="button" id="sortDirBtn" aria-label="Sortimise suund">⬇️</button>
  </div>
</div>
<div id="list"></div>
<div id="mapview" style="display:none"><div id="map-canvas"></div></div>
</div>

<div id="view-menu" style="display:none">
  <div class="viewheader">
    <button type="button" class="backbtn" id="menuBackBtn" aria-label="Tagasi">‹</button>
    <div class="viewtitle">Tööriistad</div>
  </div>
  <div id="menuList">
    <button type="button" class="menuitem" id="coordMenuItem">Koordinaatide teisendaja</button>
    <button type="button" class="menuitem" id="projMenuItem">Koordinaatide projektsioon</button>
    <button type="button" class="menuitem" id="settingsMenuItem">Seaded</button>
  </div>
</div>

<div id="view-settings" style="display:none">
  <div class="viewheader">
    <button type="button" class="backbtn" id="settingsBackBtn" aria-label="Tagasi">‹</button>
    <div class="viewtitle">Seaded</div>
  </div>
  <div id="settingsList">
    <button type="button" class="menuitem" id="originMenuItem">Kauguse arvutamine</button>
    <button type="button" class="menuitem" id="dataMenuItem">Andmed</button>
  </div>
  <div class="settings-body">
    <div class="settings-version" id="settingsVersion"></div>
  </div>
</div>

<div id="view-origin" style="display:none">
  <div class="viewheader">
    <button type="button" class="backbtn" id="originBackBtn" aria-label="Tagasi">‹</button>
    <div class="viewtitle">Kauguse arvutamine</div>
  </div>
  <div class="settings-body">
    <label class="settings-label" for="originSel">Arvuta kaugus asukohast:</label>
    <select id="originSel" class="settings-select">
      <option value="current" selected>Praegune asukoht</option>
    </select>
  </div>
</div>

<div id="view-data" style="display:none">
  <div class="viewheader">
    <button type="button" class="backbtn" id="dataBackBtn" aria-label="Tagasi">‹</button>
    <div class="viewtitle">Andmed</div>
  </div>
  <div class="settings-body">
    <label class="settings-label">Minu leiud</label>
    <div id="dataStatus" class="data-status"></div>
    <input type="file" id="dataFileInput" accept="application/json,.json" style="display:none">
    <button type="button" class="data-load-btn" id="dataLoadBtn">Laadi JSON fail</button>
    <div id="dataMsg" class="data-msg"></div>
  </div>
</div>

<div id="view-coord" style="display:none">
  <div class="viewheader">
    <button type="button" class="backbtn" id="coordBackBtn" aria-label="Tagasi">‹</button>
    <div class="viewtitle">Koordinaatide teisendaja</div>
  </div>
  <div class="cc-body">
    <div class="cc-card cc-input-card">
      <div class="cc-row-label">
        <span class="cc-label-text">Sisend</span>
        <span class="cc-badge" id="cc-badge" style="display:none"></span>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button type="button" class="cc-copy-btn" id="cc-paste-btn">Kleebi</button>
          <button type="button" class="cc-copy-btn" id="cc-loc-btn" style="display:none">⌖</button>
        </div>
      </div>
      <input id="cc-inp" type="text" placeholder="Kleebi mistahes koordinaadi formaat"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div class="cc-status" id="cc-status"></div>
    </div>

    <div class="cc-card">
      <div class="cc-row-label">
        <span class="cc-label-text">Kraadid + detsimaalminutid</span>
        <button type="button" class="cc-copy-btn" style="margin-left:auto" id="cc-copy-dmm-btn">Kopeeri</button>
      </div>
      <input id="cc-out-dmm" type="text" readonly placeholder="N 58° 22.753′  E 024° 30.006′">
    </div>

    <div class="cc-card">
      <div class="cc-row-label">
        <span class="cc-label-text">Kümnendkraadid</span>
        <button type="button" class="cc-copy-btn" style="margin-left:auto" id="cc-copy-dd-btn">Kopeeri</button>
      </div>
      <input id="cc-out-dd" type="text" readonly placeholder="58.379217, 24.500100">
    </div>

    <div class="cc-card">
      <div class="cc-row-label">
        <span class="cc-label-text">L-EST97 (EPSG:3301)</span>
        <button type="button" class="cc-copy-btn" style="margin-left:auto" id="cc-copy-lest-btn">Kopeeri</button>
      </div>
      <input id="cc-out-lest" type="text" readonly placeholder="529257, 6471080">
    </div>

    <div id="cc-map-wrap" style="display:none;margin-top:10px">
      <div id="cc-map" style="height:300px;border-radius:14px;overflow:hidden"></div>
    </div>
  </div>
</div>

<div id="view-proj" style="display:none">
  <div class="viewheader">
    <button type="button" class="backbtn" id="projBackBtn" aria-label="Tagasi">‹</button>
    <div class="viewtitle">Koordinaatide projektsioon</div>
  </div>
  <div class="cc-body">
    <div class="cc-card cc-input-card">
      <div class="cc-row-label">
        <span class="cc-label-text">Sisend</span>
        <span class="cc-badge" id="pj-badge" style="display:none"></span>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button type="button" class="cc-copy-btn" id="pj-paste-btn">Kleebi</button>
          <button type="button" class="cc-copy-btn" id="pj-loc-btn" style="display:none">⌖</button>
        </div>
      </div>
      <input id="pj-inp" type="text" placeholder="Kleebi mistahes koordinaadi formaat"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div class="cc-status" id="pj-status"></div>
    </div>

    <div class="cc-card">
      <div class="cc-pair">
        <div>
          <span class="cc-label-text">Nurk (°)</span>
          <input id="pj-angle" type="number" inputmode="decimal" placeholder="0–360">
        </div>
        <div>
          <span class="cc-label-text">Vahemaa (m)</span>
          <input id="pj-dist" type="number" inputmode="decimal" placeholder="meetrites">
        </div>
      </div>
    </div>

    <div class="cc-card">
      <div class="cc-row-label">
        <span class="cc-label-text">Kraadid + detsimaalminutid</span>
        <button type="button" class="cc-copy-btn" style="margin-left:auto" id="pj-copy-out-btn">Kopeeri</button>
      </div>
      <input id="pj-out" type="text" readonly placeholder="N 58° 22.753′  E 024° 30.006′">
    </div>

    <div id="pj-map-wrap" style="display:none;margin-top:10px">
      <div id="pj-map" style="height:300px;border-radius:14px;overflow:hidden"></div>
    </div>
  </div>
</div>

<div id="view-fullmap" style="display:none">
  <div id="fullmap-map"></div>
</div>

<div class="navbackdrop" id="navBackdrop"></div>
<div class="navmenu" id="navMenu"></div>

<script src="./app.js"></script>
</body>
</html>
