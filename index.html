<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Geocaches</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#007aff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Geocaches">
<link rel="apple-touch-icon" href="./icons/pwa/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/pwa/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icons/pwa/favicon-16.png">
<link rel="stylesheet" href="./style.css">
<link rel="preload" href="./data.json" as="fetch" crossorigin>
</head>
<body>
<div id="view-search">
<div id="top">
  <div class="searchrow">
    <button type="button" id="menuBtn" data-i18n-aria-label="menuAria">...</button>
    <input id="q" type="search" data-i18n-placeholder="searchPlaceholder" autofocus autocorrect="off" autocapitalize="none" spellcheck="false">
  </div>
  <div class="statusrow">
    <button type="button" id="viewToggleBtn" data-i18n-aria-label="viewToggleAria">🗺️</button>
    <div id="count"></div>
    <button type="button" class="fieldToggleBtn" id="idToggleBtn" aria-pressed="true" data-i18n-aria-label="idToggleAria">ID</button>
    <button type="button" class="fieldToggleBtn" id="dtsToggleBtn" aria-pressed="true" data-i18n-aria-label="dtsToggleAria">D/T/S</button>
    <select id="sortSel">
      <option value="id" selected data-i18n="sortById"></option>
      <option value="name" data-i18n="sortByName"></option>
      <option value="distance" id="distOpt" disabled data-i18n="sortByDistance"></option>
    </select>
    <button type="button" id="sortDirBtn" data-i18n-aria-label="sortDirAria">⬇️</button>
  </div>
  <div class="filterrow">
    <button type="button" class="findsToggleBtn" id="hideFoundBtn" style="display:none"
            aria-pressed="false" data-i18n-aria-label="hideFoundAria">
      <span class="hidefound-icon" aria-hidden="true">🙂</span>
    </button>
  </div>
</div>
<div id="list"></div>
<div id="mapview" style="display:none"><div id="map-canvas"></div></div>
</div>

<div id="view-menu" style="display:none">
  <div class="viewheader">
    <button type="button" class="backbtn" id="menuBackBtn" data-i18n-aria-label="backAria">‹</button>
    <div class="viewtitle" data-i18n="toolsTitle"></div>
  </div>
  <div id="menuList">
    <button type="button" class="menuitem" id="coordMenuItem" data-i18n="coordConverterItem"></button>
    <button type="button" class="menuitem" id="projMenuItem" data-i18n="coordProjectionItem"></button>
    <button type="button" class="menuitem" id="settingsMenuItem" data-i18n="settingsItem"></button>
  </div>
</div>

<div id="view-settings" style="display:none">
  <div class="viewheader">
    <button type="button" class="backbtn" id="settingsBackBtn" data-i18n-aria-label="backAria">‹</button>
    <div class="viewtitle" data-i18n="settingsTitle"></div>
  </div>
  <div id="settingsList">
    <button type="button" class="menuitem" id="originMenuItem" data-i18n="distanceOriginItem"></button>
    <button type="button" class="menuitem" id="dataMenuItem" data-i18n="dataItem"></button>
  </div>
  <div class="settings-body">
    <div class="settings-version" id="settingsVersion"></div>
  </div>
</div>

<div id="view-origin" style="display:none">
  <div class="viewheader">
    <button type="button" class="backbtn" id="originBackBtn" data-i18n-aria-label="backAria">‹</button>
    <div class="viewtitle" data-i18n="distanceTitle"></div>
  </div>
  <div class="settings-body">
    <label class="settings-label" for="originSel" data-i18n="distanceFromLabel"></label>
    <select id="originSel" class="settings-select">
      <option value="current" selected data-i18n="currentLocationOption"></option>
    </select>
  </div>
</div>

<div id="view-data" style="display:none">
  <div class="viewheader">
    <button type="button" class="backbtn" id="dataBackBtn" data-i18n-aria-label="backAria">‹</button>
    <div class="viewtitle" data-i18n="dataTitle"></div>
  </div>
  <div class="settings-body">
    <label class="settings-label" data-i18n="myFindsLabel"></label>
    <div id="dataStatus" class="data-status"></div>
    <input type="file" id="dataFileInput" accept="application/json,.json" style="display:none">
    <button type="button" class="data-load-btn" id="dataLoadBtn" data-i18n="loadJsonBtn"></button>
    <div id="dataMsg" class="data-msg"></div>
  </div>
</div>

<div id="view-coord" style="display:none">
  <div class="viewheader">
    <button type="button" class="backbtn" id="coordBackBtn" data-i18n-aria-label="backAria">‹</button>
    <div class="viewtitle" data-i18n="coordConverterTitle"></div>
  </div>
  <div class="cc-body">
    <div class="cc-card cc-input-card">
      <div class="cc-row-label">
        <span class="cc-label-text" data-i18n="inputLabel"></span>
        <span class="cc-badge" id="cc-badge" style="display:none"></span>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button type="button" class="cc-copy-btn" id="cc-paste-btn" data-i18n="pasteBtn"></button>
          <button type="button" class="cc-copy-btn" id="cc-loc-btn" style="display:none">⌖</button>
        </div>
      </div>
      <input id="cc-inp" type="text" data-i18n-placeholder="coordInputPlaceholder"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div class="cc-status" id="cc-status"></div>
    </div>

    <div class="cc-card">
      <div class="cc-row-label">
        <span class="cc-label-text" data-i18n="dmmLabel"></span>
        <button type="button" class="cc-copy-btn" style="margin-left:auto" id="cc-copy-dmm-btn" data-i18n="copyBtn"></button>
      </div>
      <div class="cc-maps-row" id="cc-maps-dmm-row" style="display:none">
        <button type="button" class="navbtn" id="cc-maps-dmm-btn" data-i18n="mapBtn"></button>
      </div>
      <input id="cc-out-dmm" type="text" readonly placeholder="N 58° 22.753′  E 024° 30.006′">
    </div>

    <div class="cc-card">
      <div class="cc-row-label">
        <span class="cc-label-text" data-i18n="ddLabel"></span>
        <button type="button" class="cc-copy-btn" style="margin-left:auto" id="cc-copy-dd-btn" data-i18n="copyBtn"></button>
      </div>
      <div class="cc-maps-row" id="cc-maps-dd-row" style="display:none">
        <button type="button" class="navbtn" id="cc-maps-dd-btn" data-i18n="mapBtn"></button>
      </div>
      <input id="cc-out-dd" type="text" readonly placeholder="58.379217, 24.500100">
    </div>

    <div class="cc-card">
      <div class="cc-row-label">
        <span class="cc-label-text" data-i18n="lestLabel"></span>
        <button type="button" class="cc-copy-btn" style="margin-left:auto" id="cc-copy-lest-btn" data-i18n="copyBtn"></button>
      </div>
      <div class="cc-maps-row" id="cc-maps-lest-row" style="display:none">
        <button type="button" class="navbtn" id="cc-maps-lest-btn" data-i18n="mapBtn"></button>
      </div>
      <input id="cc-out-lest" type="text" readonly placeholder="529257, 6471080">
    </div>

    <div id="cc-map-wrap" style="display:none;margin-top:10px">
      <div id="cc-map" style="height:300px;border-radius:14px;overflow:hidden"></div>
    </div>
  </div>
</div>

<div id="view-proj" style="display:none">
  <div class="viewheader">
    <button type="button" class="backbtn" id="projBackBtn" data-i18n-aria-label="backAria">‹</button>
    <div class="viewtitle" data-i18n="coordProjectionTitle"></div>
  </div>
  <div class="cc-body">
    <div class="cc-card cc-input-card">
      <div class="cc-row-label">
        <span class="cc-label-text" data-i18n="inputLabel"></span>
        <span class="cc-badge" id="pj-badge" style="display:none"></span>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button type="button" class="cc-copy-btn" id="pj-paste-btn" data-i18n="pasteBtn"></button>
          <button type="button" class="cc-copy-btn" id="pj-loc-btn" style="display:none">⌖</button>
        </div>
      </div>
      <input id="pj-inp" type="text" data-i18n-placeholder="coordInputPlaceholder"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div class="cc-status" id="pj-status"></div>
    </div>

    <div class="cc-card">
      <div class="cc-pair">
        <div>
          <span class="cc-label-text" data-i18n="angleLabel"></span>
          <input id="pj-angle" type="number" inputmode="decimal" placeholder="0–360">
        </div>
        <div>
          <span class="cc-label-text" data-i18n="distanceLabel"></span>
          <input id="pj-dist" type="number" inputmode="decimal" data-i18n-placeholder="distancePlaceholder">
        </div>
      </div>
    </div>

    <div class="cc-card">
      <div class="cc-row-label">
        <span class="cc-label-text" data-i18n="dmmLabel"></span>
        <button type="button" class="cc-copy-btn" style="margin-left:auto" id="pj-copy-out-btn" data-i18n="copyBtn"></button>
      </div>
      <div class="cc-maps-row" id="pj-maps-row" style="display:none">
        <button type="button" class="navbtn" id="pj-maps-btn" data-i18n="mapBtn"></button>
      </div>
      <input id="pj-out" type="text" readonly placeholder="N 58° 22.753′  E 024° 30.006′">
    </div>

    <div id="pj-map-wrap" style="display:none;margin-top:10px">
      <div id="pj-map" style="height:300px;border-radius:14px;overflow:hidden"></div>
    </div>
  </div>
</div>

<div id="view-fullmap" style="display:none">
  <div id="fullmap-map"></div>
</div>

<div class="navbackdrop" id="navBackdrop"></div>
<div class="navmenu" id="navMenu"></div>

<script src="./i18n.js"></script>
<script src="./app.js"></script>
</body>
</html>
